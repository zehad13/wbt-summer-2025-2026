<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Club Membership Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>American International University-Bangladesh (AIUB)</h1>
<h2>University Club Membership Registration</h2>

<form id="clubForm">

<div class="row">
<label>First Name</label>
<input type="text" id="fname">
<span class="error"></span>
</div>

<div class="row">
<label>Last Name</label>
<input type="text" id="lname">
<span class="error"></span>
</div>

<div class="row">
<label>Email Address</label>
<input type="email" id="email">
<span class="error"></span>
</div>

<div class="row">
<label>Password</label>
<input type="password" id="password">
<span class="error"></span>
</div>

<div class="row">
<label>Gender</label>

<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other

<span class="error"></span>
</div>

<div class="row">
<label>Interested Clubs</label>

<input type="checkbox" name="club" value="Programming"> Programming

<input type="checkbox" name="club" value="Photography"> Photography

<input type="checkbox" name="club" value="Sports"> Sports

<input type="checkbox" name="club" value="Music"> Music

<span class="error"></span>
</div>

<div class="row">
<label>Club Category</label>

<select id="category">
<option value="">Select Category</option>
<option>Technical</option>
<option>Cultural</option>
<option>Sports</option>
<option>Social Service</option>
</select>

<span class="error"></span>
</div>

<div class="row">
<label>Why do you want to join?</label>

<textarea id="reason" rows="5"></textarea>

<span class="error"></span>
</div>

<div class="row">
<button type="submit">Register</button>
<button type="reset">Reset</button>
</div>

</form>

<p id="success"></p>

</div>

<script src="script.js"></script>

</body>
</html>
